# KARIMO Configuration Template
#
# This file is auto-generated by /karimo:configure and serves as the
# project configuration for KARIMO execution.
#
# Location: .karimo/config.yaml
# Version: 9.10.0

# Project metadata (auto-detected)
project:
  name: ""                    # Project name
  runtime: ""                 # node | python | go | rust | etc.
  framework: ""               # next.js | react | django | etc.
  package_manager: ""         # pnpm | npm | yarn | pip | cargo | etc.

# Build/validation commands (auto-detected)
commands:
  build: ""                   # e.g., pnpm run build
  lint: ""                    # e.g., pnpm run lint
  test: ""                    # e.g., pnpm test
  typecheck: ""               # e.g., pnpm run typecheck

# File boundaries (project-specific)
boundaries:
  never_touch:                # Files agents must never modify
    - "*.lock"
    - ".env*"
    - "migrations/"
  require_review:             # Files that flag for human review
    - "src/auth/*"
    - "*.config.js"

# GitHub integration (auto-detected)
github:
  owner_type: ""              # organization | user
  owner: ""                   # GitHub username or org name
  repository: ""              # Repository name

# Execution settings
execution:
  default_model: sonnet       # sonnet | opus
  max_parallel: 3             # Max concurrent tasks per wave
  pre_pr_checks:              # Validation before PR creation
    - build
    - typecheck
    - lint

  # Model selection configuration (v9.3)
  models:
    default: sonnet                    # Default model for all tasks
    complexity_threshold: 5            # Complexity >= N uses Opus
    escalation:
      after_failures: 1                # Failures before escalating to Opus
      triggers:                        # Additional escalation triggers
        - architectural_issues
        - type_system_issues

# Slicing configuration (v8.3)
slicing:
  thresholds:
    no_slicing: 15            # Tasks below this don't need slicing
    two_slices: 30            # Tasks at this level suggest 2 slices
    three_slices: 50          # Tasks at this level suggest 3 slices
    # Above three_slices: recommend 4+ slices
  complexity_thresholds:
    no_slicing: 100           # Points below this don't need slicing
    two_slices: 200           # Points at this level suggest 2 slices
    three_slices: 300         # Points at this level suggest 3 slices
    # Above three_slices: recommend 4+ slices
  wave_threshold: 8           # Waves at or above this suggest slicing
  auto_suggest: true          # Show slicing recommendations in interview

# Orchestration policy layer (v9.0+)
orchestration:
  version: 2                    # 1 = legacy (hardcoded), 2 = policy layer
  integration:
    cadence: worktree           # worktree | wave | feature
    auto_merge_on_green: true   # Skip human if CI passes

  # Review cadence configuration (v9.1)
  review:
    trigger: per-task           # per-task | per-wave | per-gate | on-umbrella
    scope: pr-diff              # pr-diff | wave-diff | cumulative
    skip_if_diff_under: 0       # Skip review if PR has fewer lines (0 = never skip)
    on_findings: halt           # halt | comment-only

    # Per-provider overrides (optional)
    providers:
      greptile:
        fire_at: []             # when this provider fires: task, wave, gate, umbrella
        on_findings: halt       # halt | comment-only
      code-review:
        fire_at: []             # when this provider fires: task, wave, gate, umbrella
        on_findings: halt       # halt | comment-only

  # Gate model configuration (v9.2+)
  gates:
    model: pause                # pause | conditional | skip-on-pass
    auto_place: false           # Infer gates during /karimo:plan
    max_waves_per_gate: 8       # Max waves between gates (inference heuristic)
    conditions:                 # For conditional/skip-on-pass models
      require_tests_pass: true  # All tests must pass
      require_build_pass: true  # Build must succeed
      max_critical_findings: 0  # Max P1 findings allowed (0 = none)

      # Custom condition expressions (v9.4)
      custom: []                # Custom conditions beyond presets
      # Example:
      # - expr: "coverage >= 80"
      #   label: "Code coverage threshold"
      # - expr: "lint_errors == 0"
      #   label: "No lint errors"
      # - expr: "bundle_size < 500kb"
      #   label: "Bundle size limit"

    # Gate placements (v9.2) — typically set per-PRD, not project-level
    # placements:
    #   - after_wave: 3
    #     label: "Review core implementation"
    #     model: conditional
    #     # Per-gate review (v9.4)
    #     review:
    #       trigger: true         # Force review at this gate
    #       provider: greptile    # Override default provider
    #       scope: cumulative     # Review all changes since last gate
    #     # Parallel branches (v9.4)
    #     branches:
    #       - waves: [4, 5]
    #         label: "Frontend track"
    #       - waves: [4, 5, 6]
    #         label: "Backend track"
    #     merge_strategy: all     # all | any

# Review configuration (legacy — see orchestration.review for v9.1+)
review:
  provider: none              # none | greptile | code-review | {custom}
  frequency: per-task         # per-task | per-wave | per-slice
  threshold: 5                # Greptile score threshold (0-5)
  max_revision_loops: 3       # Max revision attempts before escalation
  none_behavior: manual       # manual | auto-pass (when provider: none)

  # Provider registry (v9.6)
  providers:
    registered:               # List of available providers
      - greptile              # Built-in: .karimo/providers/greptile/
      - code-review           # Built-in: .karimo/providers/code-review/
      # - my-provider         # Custom: .karimo/providers/my-provider/

    active: none              # Currently active provider (or "none")

    # Per-provider configuration (optional)
    # config:
    #   greptile:
    #     threshold: 5
    #   code-review:
    #     block_on_red: true
    #   my-provider:
    #     api_endpoint: https://api.example.com

# Cost control settings
cost:
  escalate_after_failures: 1  # Failures before Sonnet → Opus escalation
  max_attempts: 3             # Total attempts before hard gate

# Review bypass rules
allow_bypass:
  future_work_overlap: true   # Allow pass when finding references future-wave files
  false_positive_factual: true # Allow pass when finding contradicts config

# Final merge gate settings
final_merge_gate:
  verify_deferred_findings: true  # Check future-work-overlap files exist at merge
  require_greptile_pass: true     # Require final PR to pass Greptile

# Pre-execution prompt
pre_execution_prompt: true    # Show execution configuration before running

# Claude subscription configuration (v9.10)
subscription:
  plan: none                  # none | pro | max-5x | max-20x | team-standard | team-premium | enterprise
  team_seats: 1               # Seat count for team plans (team-standard, team-premium)
  enterprise_capacity: 0      # Custom 5hr capacity (tokens) for enterprise - user-provided
  configured_at: ""           # ISO timestamp when configured
